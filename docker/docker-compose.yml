services:
  postgres:
    image: postgres:16-alpine
    container_name: foodhope-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-foodhope}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-foodhope}
      POSTGRES_DB: ${POSTGRES_DB:-foodhope}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-foodhope} -d ${POSTGRES_DB:-foodhope}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: foodhope-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    image: foodhope-api:local
    container_name: foodhope-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${PORT:-5000}
      APP: ${APP}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      SWAGGER_USER: ${SWAGGER_USER}
      SWAGGER_PASSWORD: ${SWAGGER_PASSWORD}
      IP_IMPRESSORA: ${IP_IMPRESSORA:-}
    volumes:
      - produto-imagens:/app/public/produto
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PUBLISH_PORT:-5000}:5000"

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_SITE_URL: ${VITE_SITE_URL}
    image: foodhope-web:local
    container_name: foodhope-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PUBLISH_PORT:-80}:80"

  cloudflared-api:
    profiles: ["tunnel"]
    image: cloudflare/cloudflared:latest
    container_name: foodhope-cloudflared-api
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN_API}
    depends_on:
      - api

  cloudflared-web:
    profiles: ["tunnel"]
    image: cloudflare/cloudflared:latest
    container_name: foodhope-cloudflared-web
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN_WEB}
    depends_on:
      - web

  escpos:
    profiles: ["dev"]
    image: ghcr.io/lezram/escpos-emulator:latest
    container_name: escpos
    ports:
      - "9100:9100"
      - "3000:3000"

volumes:
  postgres-data:
  redis-data:
  produto-imagens:
